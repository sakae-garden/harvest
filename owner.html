<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍄 収穫予測 | 栄ガーデン</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root{
  --g:#00e676;--gd:#00c853;--gdim:#1b5e20;
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#222;
  --border:#2a2a2a;--text:#f0f0f0;--text2:#888;--text3:#444;
  --red:#ff5252;--orange:#ff9100;--blue:#40c4ff;--purple:#ce93d8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Noto Sans JP',sans-serif;font-size:14px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gdim);border-radius:2px}
.header{background:linear-gradient(90deg,#000,#050d05 60%,#091409);border-bottom:1px solid var(--gdim);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{font-size:26px;filter:drop-shadow(0 0 10px var(--g))}
.header-title{font-size:17px;font-weight:900;letter-spacing:-.5px}
.header-sub{font-size:10px;color:var(--g);margin-top:1px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.reload-btn{background:rgba(0,230,118,.1);border:1px solid var(--gdim);border-radius:8px;padding:6px 12px;color:var(--g);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:11px;font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
.nav-btn.active{color:var(--g);border-bottom-color:var(--g);background:rgba(0,230,118,.04)}
.main{padding:14px;max-width:860px;margin:0 auto}
.tab{display:none}.tab.active{display:block}

/* SUMMARY */
.summary{display:flex;background:var(--bg2);border:1px solid var(--gdim);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 0 20px rgba(0,230,118,.1)}
.summary-item{flex:1;text-align:center}
.summary-num{font-size:26px;font-weight:900;color:var(--g);line-height:1.1;letter-spacing:-1px;text-shadow:0 0 12px var(--g)}
.summary-num.yen{color:var(--orange);text-shadow:none}
.summary-unit{font-size:12px;font-weight:400}
.summary-label{font-size:11px;color:var(--text2);margin-top:3px}
.summary-div{width:1px;background:var(--border)}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:700;color:var(--g);margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px}

/* FIELDS */
.field{margin-bottom:12px}
.field-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;letter-spacing:.3px;text-transform:uppercase}
.input{width:100%;padding:9px 11px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.input:focus{border-color:var(--g)}
.input[type=number]::-webkit-outer-spin-button,.input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

/* BUTTON */
.btn{width:100%;padding:11px;background:linear-gradient(135deg,#00c853,#00e676);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:opacity .15s}
.btn:disabled{opacity:.3;cursor:default}
.btn-sm{padding:8px 16px;width:auto;font-size:12px}
.btn-outline{background:transparent;border:1.5px solid var(--gdim);color:var(--g);font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.btn-outline:hover{background:rgba(0,230,118,.08)}
.btn-danger-sm{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.25);border-radius:6px;padding:4px 8px;color:var(--red);cursor:pointer;font-size:10px;font-family:inherit}

/* INITIAL STOCK */
.init-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:5px;border:1px solid var(--border)}
.init-row .ri{font-size:16px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}

/* DAY ROWS */
.day-row{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:3px;border-radius:8px;border:1px solid transparent;transition:background .15s}
.day-row:hover{background:var(--bg3)}
.day-row.today{background:rgba(0,230,118,.06);border-color:var(--gdim)}
.today-badge{font-size:9px;background:var(--g);color:#000;border-radius:4px;padding:1px 5px;font-weight:800;width:fit-content;letter-spacing:.3px}
.bar-track{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;display:flex;margin-bottom:3px}
.bar-seg{height:100%;transition:width .3s}
.kg-num{font-size:13px;font-weight:700;color:#fff}
.yen-small{font-size:11px;color:var(--text2)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:8px;border:1px solid var(--border);margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* SIM METRICS */

/* SECTION */
.section-title{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.badge{background:rgba(0,230,118,.15);color:var(--g);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
.empty{text-align:center;padding:24px 16px;color:var(--text3);font-size:13px}
.loading{text-align:center;padding:24px;color:var(--text2);font-size:13px}
.info-box{background:rgba(255,145,0,.07);border:1px solid rgba(255,145,0,.25);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--orange);margin-bottom:14px;line-height:1.7}
.divider{height:1px;background:var(--border);margin:16px 0}

@media(max-width:480px){
  .form-row{grid-template-columns:1fr}
    .summary-num{font-size:20px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-icon">🍄</span>
    <div>
      <div class="header-title">収穫予測</div>
      <div class="header-sub">栄ガーデン · Owner Dashboard</div>
    </div>
  </div>
  <button class="reload-btn" onclick="loadAll()">↻ 更新</button>
</header>

<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('forecast',this)"><span>📅</span>収穫予測</button>
  <button class="nav-btn" onclick="switchTab('initial',this)"><span>🌱</span>初期在庫</button>
</nav>

<div class="main">

  <!-- ══ 収穫予測タブ ══ -->
  <div id="tab-forecast" class="tab active">
    <div id="fc-list" class="loading">作業データを読み込み中...</div>
  </div>

  <!-- ══ 初期在庫タブ ══ -->
  <div id="tab-initial" class="tab">
    <div class="info-box">
      💡 アプリ運用開始時に、栽培舎に既に置いてある菌床を登録します。<br>
      実際に袋出し・浸水を実施した日付で入力してください。<br>
      <strong>※ この登録は1回だけ使用します。後から変更も可能です。</strong>
    </div>

    <div class="card">
      <div class="card-title">🌱 初期在庫を追加</div>
      <div class="form-row">
        <div class="field">
          <label class="field-label">作業日（実施した日）</label>
          <input type="date" id="ini-date" class="input">
        </div>
        <div class="field">
          <label class="field-label">個数</label>
          <input type="number" id="ini-count" class="input" placeholder="例: 200" min="1">
        </div>
      </div>
      <div class="field">
        <label class="field-label">種別</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="ini-type-grid"></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px">
        <button class="btn btn-sm" onclick="addInitial()">＋ 追加</button>
        <button class="btn-outline" onclick="saveInitial()">💾 確定・保存</button>
      </div>
    </div>

    <div class="section-title">登録済み初期在庫 <span class="badge" id="ini-count-badge">0</span></div>
    <div id="ini-list"></div>
    <div style="margin-top:12px">
      <button class="btn-outline" style="color:var(--red);border-color:rgba(255,82,82,.3)" onclick="clearInitial()">
        🗑 全クリア
      </button>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec'; // ← GASのURLに書き換え

var PRICE = 1500;
var WORK_TYPES = {
  bag:   {label:'袋出し',  delay:10, yield_g:400, color:'#00e676', icon:'🍄'},
  soak1: {label:'1番浸水', delay:12, yield_g:250, color:'#40c4ff', icon:'💧'},
  soak2: {label:'2番浸水', delay:12, yield_g:150, color:'#ce93d8', icon:'💜'},
};
var cbIdx=0, selIniType='unripe_bag';
var entries=[], records=[], initialStock=[];

function today(){ return new Date().toISOString().split('T')[0]; }
function addDays(s,n){ var d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; }
function fmtDate(s){
  var d=new Date(s+'T00:00:00');
  return (d.getMonth()+1)+'/'+(d.getDate())+'(['+'日月火水木金土'[d.getDay()]+'])';
}
function fmtKg(v){ return parseFloat(v).toFixed(1); }

function jsonp(url,base,ok,ng){
  var n=base+'_'+(cbIdx++);
  window[n]=function(res){ ok(res); cleanup(); };
  var s=document.createElement('script');
  s.src=url+'&callback='+n;
  s.onerror=function(){ if(ng) ng(); cleanup(); };
  document.head.appendChild(s);
  function cleanup(){ if(window[n]) delete window[n]; if(s.parentNode) s.parentNode.removeChild(s); }
  setTimeout(function(){ cleanup(); },10000);
}

// ── 収穫予測計算 ──────────────────────────────────────────────
function calcForecast(ents, startDate, days){
  var map={};
  for(var i=0;i<days;i++) map[addDays(startDate,i)]={total:0,breakdown:{}};
  ents.forEach(function(e){
    var cfg=WORK_TYPES[e.type]; if(!cfg) return;
    var hd=addDays(e.date,cfg.delay);
    if(map[hd]){
      var kg=e.count*cfg.yield_g/1000;
      map[hd].total+=kg;
      map[hd].breakdown[e.type]=(map[hd].breakdown[e.type]||0)+kg;
    }
  });
  return map;
}

// ── 初期化 ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('ini-date').value=today();
  buildIniTypeGrid();
  loadAll();
  renderFcLegend();
});

function loadAll(){
  document.getElementById('fc-list').innerHTML='<div class="loading">データ読み込み中...</div>';
  jsonp(API_URL+'?action=getEntries','ge',function(res){
    if(res.success){ entries=res.entries||[]; renderForecast(); }
    else document.getElementById('fc-list').innerHTML='<div class="empty">データの取得に失敗しました</div>';
  },function(){ document.getElementById('fc-list').innerHTML='<div class="empty">通信エラー</div>'; });
  jsonp(API_URL+'?action=getRecords','gr',function(res){
    if(res.success){ records=res.records||[]; renderForecast(); }
  },null);
  jsonp(API_URL+'?action=getInitial','gi',function(res){
    if(res.success){ initialStock=res.initial||[]; renderIniList(); renderForecast(); }
  },null);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── 収穫予測レンダリング（カレンダー形式）──────────────────
function renderFcLegend(){}  // 不要（削除済み）

function renderForecast(){
  var td=today();
  var allEntries=entries.concat(initialStock);
  var forecast=calcForecast(allEntries, td, 32);
  var recMap={};
  records.forEach(function(r){ recMap[r.date]=r; });

  // 今日から30日分を取得
  var days=[];
  for(var i=0;i<30;i++) days.push(addDays(td,i));

  // 週ごとにグループ化（今日の曜日から始まる）
  var weeks=[];
  var week=[];
  var todayDow=new Date(td+'T00:00:00').getDay(); // 0=日
  // 先頭の空白セル
  for(var p=0;p<todayDow;p++) week.push(null);
  days.forEach(function(d){
    week.push(d);
    if(week.length===7){ weeks.push(week); week=[]; }
  });
  if(week.length>0){
    while(week.length<7) week.push(null);
    weeks.push(week);
  }

  var DOW=['日','月','火','水','木','金','土'];
  var maxKg=Math.max.apply(null,days.map(function(d){ return forecast[d]?forecast[d].total:0; }).concat([1]));

  var html='<div style="overflow-x:auto">'
    +'<table style="width:100%;border-collapse:collapse;min-width:420px">'
    +'<thead><tr>'
    +DOW.map(function(w,i){
      var c=i===0?'#ff5252':i===6?'#40c4ff':'var(--text2)';
      return '<th style="padding:6px 2px;font-size:11px;font-weight:700;color:'+c+';text-align:center;border-bottom:1px solid var(--border)">'+w+'</th>';
    }).join('')
    +'</tr></thead><tbody>';

  weeks.forEach(function(wk){
    html+='<tr>';
    wk.forEach(function(d,wi){
      if(!d){ html+='<td style="padding:4px 2px;height:72px"></td>'; return; }
      var fc=forecast[d]||{total:0,breakdown:{}};
      var rec=recMap[d];
      var isToday=(d===td);
      var dow=new Date(d+'T00:00:00').getDay();
      var dayNum=parseInt(d.slice(8));
      var monthNum=parseInt(d.slice(5,7));
      var isNewMonth=(dayNum===1);
      var textColor=dow===0?'#ff5252':dow===6?'#40c4ff':'var(--text)';
      var barPct=fc.total>0?(fc.total/maxKg*100):0;

      // 収穫量の積み上げバー（小さく）
      var bars='';
      if(fc.total>0){
        Object.keys(fc.breakdown).forEach(function(type){
          var wt=WORK_TYPES[type]; if(!wt) return;
          bars+='<div style="height:100%;width:'+(fc.breakdown[type]/maxKg*100)+'%;background:'+wt.color+';float:left"></div>';
        });
      }

      html+='<td style="padding:3px 2px;vertical-align:top;height:72px">'
        +'<div style="border-radius:8px;padding:4px 5px;height:100%;'
        +(isToday?'background:rgba(0,230,118,.1);border:1.5px solid var(--gdim)':'border:1px solid var(--border)')
        +'">'
        // 日付
        +'<div style="font-size:11px;font-weight:'+(isToday?800:500)+';color:'+(isToday?'var(--g)':textColor)+';">'
        +(isNewMonth?'<span style="font-size:9px;color:var(--text2)">'+monthNum+'月</span>':'')
        +(isToday?'<span style="font-size:9px;background:var(--g);color:#000;border-radius:10px;padding:0 4px;font-weight:800">'+dayNum+'</span>':dayNum)
        +'</div>'
        // バー
        +(fc.total>0?
          '<div style="height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:3px 0;clear:both"><div style="height:100%;overflow:hidden">'+bars+'</div></div>':
          '<div style="height:4px;margin:3px 0"></div>'
        )
        // 収穫量
        +(fc.total>0?'<div style="font-size:11px;font-weight:700;color:var(--g);line-height:1.2">'+fc.total.toFixed(1)+'<span style="font-size:9px;font-weight:400">kg</span></div>':'')
        // 売上
        +(fc.total>0?'<div style="font-size:9px;color:var(--text2)">'+(fc.total*PRICE/10000).toFixed(1)+'万</div>':'')
        // 実績マーク
        +(rec?'<div style="font-size:9px;color:var(--orange)">実績✓</div>':'')
        +'</div></td>';
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';

  // 凡例
  html+='<div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">'
    +Object.keys(WORK_TYPES).map(function(k){
      var v=WORK_TYPES[k];
      return '<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)">'
        +'<span style="width:10px;height:10px;border-radius:2px;background:'+v.color+';display:inline-block"></span>'
        +v.icon+' '+v.label+'（'+v.delay+'日後 '+v.yield_g+'g）'
        +'</div>';
    }).join('')
    +'</div>';

  document.getElementById('fc-list').innerHTML=html;
}

// ── 初期在庫 ──────────────────────────────────────────────

// ── 初期在庫 ──────────────────────────────────────────────────
function buildIniTypeGrid(){
  var g=document.getElementById('ini-type-grid');
  g.innerHTML=Object.keys(WORK_TYPES).map(function(k){
    var v=WORK_TYPES[k];
    var cls=k==='unripe_bag'?'unripe':k==='ripe_bag'?'ripe':k==='soak1'?'soak1':'soak2';
    return '<button style="display:flex;flex-direction:column;gap:3px;padding:9px 10px;border-radius:8px;cursor:pointer;border:1.5px solid '
      +(k===selIniType?v.color:'#2a2a2a')+';background:'
      +(k===selIniType?'rgba('+hexToRgb(v.color)+',.08)':'#181818')+';color:'
      +(k===selIniType?'#fff':'#666')+';text-align:left;font-family:inherit;transition:all .15s"'
      +' id="ibt-'+k+'" onclick="selIniType=\''+k+'\';buildIniTypeGrid()">'
      +'<span style="font-size:16px">'+v.icon+'</span>'
      +'<span style="font-size:12px;font-weight:700">'+v.label+'</span>'
      +'<span style="font-size:10px;color:#555">'+v.delay+'日後 '+v.yield_g+'g/個</span>'
      +'</button>';
  }).join('');
}
function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

var iniLocal=[];
function addInitial(){
  var date=document.getElementById('ini-date').value;
  var count=parseInt(document.getElementById('ini-count').value);
  if(!date||!count||count<=0){ alert('日付と個数を入力してください'); return; }
  iniLocal.push({id:'local_'+Date.now(),date:date,type:selIniType,count:count});
  document.getElementById('ini-count').value='';
  renderIniLocalList();
}

function renderIniLocalList(){
  var all=initialStock.concat(iniLocal);
  document.getElementById('ini-count-badge').textContent=all.length;
  var el=document.getElementById('ini-list');
  if(!all.length){ el.innerHTML='<div class="empty">初期在庫はまだ登録されていません</div>'; return; }
  el.innerHTML=all.map(function(e,i){
    var cfg=WORK_TYPES[e.type];
    var hd=addDays(e.date,cfg.delay);
    var isLocal=e.id&&e.id.toString().indexOf('local_')===0;
    return '<div class="init-row">'
      +'<span class="ri">'+cfg.icon+'</span>'
      +'<div style="flex:1"><div style="font-size:12px;font-weight:700">'+cfg.label+' <strong>'+e.count.toLocaleString()+'個</strong></div>'
      +'<div style="font-size:11px;color:var(--text2)">'+fmtDate(e.date)+' → '+fmtDate(hd)+' に '+(e.count*cfg.yield_g/1000).toFixed(1)+'kg</div></div>'
      +(isLocal?'<span class="tag" style="background:rgba(255,145,0,.15);color:var(--orange)">未保存</span>':'<span class="tag" style="background:rgba(0,230,118,.1);color:var(--g)">保存済</span>')
      +'<button class="btn-danger-sm" onclick="removeIni('+i+',\''+e.id+'\')">削除</button>'
      +'</div>';
  }).join('');
}

function renderIniList(){ renderIniLocalList(); }

function removeIni(idx,id){
  var localIdx=iniLocal.findIndex(function(x){ return x.id===id; });
  if(localIdx>=0){ iniLocal.splice(localIdx,1); renderIniLocalList(); return; }
  initialStock=initialStock.filter(function(x){ return x.id!==id; });
  renderIniLocalList();
}

function saveInitial(){
  var all=initialStock.concat(iniLocal);
  jsonp(API_URL+'?action=saveInitial&data='+encodeURIComponent(JSON.stringify(all)),'si',function(res){
    if(res.success){
      initialStock=all; iniLocal=[];
      renderIniLocalList(); renderForecast();
      alert('✅ 保存しました');
    } else alert('エラー: '+res.error);
  },function(){ alert('通信エラー'); });
}

function clearInitial(){
  if(!confirm('初期在庫を全て削除しますか？')) return;
  jsonp(API_URL+'?action=clearInitial','ci',function(res){
    if(res.success){
      initialStock=[]; iniLocal=[];
      renderIniLocalList(); renderForecast();
    } else alert('エラー');
  },null);
}
